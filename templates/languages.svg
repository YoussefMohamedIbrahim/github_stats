<svg xmlns="http://www.w3.org/2000/svg" width="480" height="240" viewBox="0 0 480 240" fill="none">
    <defs>
        <pattern id="dotPattern" width="12" height="12" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="var(--pattern)" />
        </pattern>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="var(--shadow)" flood-opacity="0.35" />
        </filter>
    </defs>

    <style>
        {% if theme == "light" %}
        :root {
            --bg: #ffffff;
            --card: #f6f8fa;
            --border: #d0d7de;
            --text: #24292f;
            --muted: #57606a;
            --accent: #0969da;
            --pattern: rgba(27, 31, 36, 0.05);
            --shadow: rgba(27, 31, 36, 0.12);
        }
        {% elif theme == "dark" %}
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #2f81f7;
            --pattern: rgba(255, 255, 255, 0.06);
            --shadow: rgba(0, 0, 0, 0.4);
        }
        {% else %}
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #2f81f7;
            --pattern: rgba(255, 255, 255, 0.06);
            --shadow: rgba(0, 0, 0, 0.4);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #ffffff;
                --card: #f6f8fa;
                --border: #d0d7de;
                --text: #24292f;
                --muted: #57606a;
                --accent: #0969da;
                --pattern: rgba(27, 31, 36, 0.05);
                --shadow: rgba(27, 31, 36, 0.12);
            }
        }
        {% endif %}

        .bg { fill: var(--bg); }
        .bg-pattern { fill: url(#dotPattern); }
        .surface { fill: var(--card); filter: url(#shadow); }
        .border { fill: none; stroke: var(--border); stroke-width: 1; }
        .divider { stroke: var(--border); stroke-width: 1; opacity: 0.6; }

        .title {
            font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 600;
            font-size: 18px;
            fill: var(--text);
        }
        .subtitle {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.2px;
            fill: var(--muted);
        }
        .lang-name {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: var(--text);
        }
        .percent {
            font-family: "JetBrains Mono", "SFMono-Regular", "Menlo", monospace;
            font-weight: 600;
            font-size: 12px;
            fill: var(--muted);
        }
        .bar-bg {
            fill: var(--border);
            opacity: 0.6;
        }
        .empty {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: var(--muted);
        }

        .enter {
            opacity: 1;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>

    <rect width="480" height="240" class="bg" />
    <rect width="480" height="240" class="bg-pattern" />

    <g>
        <rect x="14" y="14" width="452" height="212" rx="14" class="surface" />
        <rect x="14" y="14" width="452" height="212" rx="14" class="border" />
    </g>

    <g transform="translate(34, 40)" class="enter" style="animation-delay: 80ms;">
        <text x="0" y="0" class="title">Top languages</text>
        <text x="0" y="18" class="subtitle">Most used across owned repositories</text>
    </g>

    <line x1="34" y1="62" x2="446" y2="62" class="divider" />

    <g transform="translate(34, 86)">
        {% if top_languages %}
            {% for lang in top_languages %}
                <g transform="translate(0, {{ loop.index0 * 30 }})" class="enter" style="animation-delay: {{ 140 + loop.index0 * 80 }}ms;">
                    <circle cx="4" cy="-4" r="4" fill="{{ lang.color }}" />
                    <text x="14" y="0" class="lang-name">{{ lang.display_name }}</text>
                    <rect x="170" y="-8" width="190" height="8" rx="4" class="bar-bg" />
                    <rect x="170" y="-8" width="{{ lang.bar_width }}" height="8" rx="4" fill="{{ lang.color }}" />
                    <text x="410" y="0" class="percent" text-anchor="end">{{ lang.percent }}%</text>
                </g>
            {% endfor %}
        {% else %}
            <text x="0" y="0" class="empty">No language data yet</text>
        {% endif %}
    </g>
</svg>
