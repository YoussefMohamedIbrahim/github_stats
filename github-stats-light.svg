<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200" fill="none">
    <defs>
        <pattern id="dotPattern" width="12" height="12" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="var(--pattern)" />
        </pattern>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="var(--shadow)" flood-opacity="0.35" />
        </filter>
    </defs>

    <style>
        
        :root {
            --bg: #ffffff;
            --card: #f6f8fa;
            --border: #d0d7de;
            --text: #24292f;
            --muted: #57606a;
            --accent: #0969da;
            --pattern: rgba(27, 31, 36, 0.05);
            --shadow: rgba(27, 31, 36, 0.12);
        }
        

        .bg { fill: var(--bg); }
        .bg-pattern { fill: url(#dotPattern); }
        .surface { fill: var(--card); filter: url(#shadow); }
        .border { fill: none; stroke: var(--border); stroke-width: 1; }
        .divider { stroke: var(--border); stroke-width: 1; opacity: 0.6; }

        .title {
            font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 600;
            font-size: 18px;
            fill: var(--text);
        }
        .subtitle {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.2px;
            fill: var(--muted);
        }
        .label {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: var(--muted);
        }
        .value {
            font-family: "JetBrains Mono", "SFMono-Regular", "Menlo", monospace;
            font-weight: 600;
            font-size: 14px;
            fill: var(--accent);
        }

        .enter {
            opacity: 1;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>

    <rect width="480" height="200" class="bg" />
    <rect width="480" height="200" class="bg-pattern" />

    <g>
        <rect x="14" y="14" width="452" height="172" rx="14" class="surface" />
        <rect x="14" y="14" width="452" height="172" rx="14" class="border" />
    </g>

    <g transform="translate(34, 40)" class="enter" style="animation-delay: 80ms;">
        <text x="0" y="0" class="title">Youssef Mohamed Ibrahim</text>
        <text x="0" y="18" class="subtitle">@YoussefMohamedIbrahim - GitHub overview</text>
    </g>

    <line x1="34" y1="62" x2="446" y2="62" class="divider" />

    <g transform="translate(34, 92)">
        <g class="enter" style="animation-delay: 140ms;">
            <text x="0" y="0" class="label">Commits</text>
            <text x="170" y="0" class="value" text-anchor="end">319</text>
        </g>
        <g class="enter" transform="translate(0, 28)" style="animation-delay: 200ms;">
            <text x="0" y="0" class="label">Pull Requests</text>
            <text x="170" y="0" class="value" text-anchor="end">33</text>
        </g>
        <g class="enter" transform="translate(0, 56)" style="animation-delay: 260ms;">
            <text x="0" y="0" class="label">Issues</text>
            <text x="170" y="0" class="value" text-anchor="end">0</text>
        </g>

        <g class="enter" transform="translate(230, 0)" style="animation-delay: 140ms;">
            <text x="0" y="0" class="label">Stars</text>
            <text x="170" y="0" class="value" text-anchor="end">0</text>
        </g>
        <g class="enter" transform="translate(230, 28)" style="animation-delay: 200ms;">
            <text x="0" y="0" class="label">Contributed</text>
            <text x="170" y="0" class="value" text-anchor="end">6</text>
        </g>
        <g class="enter" transform="translate(230, 56)" style="animation-delay: 260ms;">
            <text x="0" y="0" class="label">Repos</text>
            <text x="170" y="0" class="value" text-anchor="end">8</text>
        </g>
    </g>
</svg>