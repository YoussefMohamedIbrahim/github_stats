<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="480" height="240" viewBox="0 0 480 240" fill="none">
    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="var(--shadow)" flood-opacity="0.35" />
        </filter>
        <filter id="neonGlow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="var(--neon-1)" flood-opacity="0.6" />
            <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="var(--neon-2)" flood-opacity="0.35" />
        </filter>
        <linearGradient id="neonGradient" x1="0" y1="0" x2="480" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="var(--neon-1)" />
            <stop offset="100%" stop-color="var(--neon-2)" />
        </linearGradient>
    </defs>

    <style>
        {% if theme == "light" %}
        :root {
            --bg: #ffffff;
            --card: #f6f8fa;
            --border: #d0d7de;
            --text: #24292f;
            --muted: #57606a;
            --accent: #0969da;
            --neon-1: #0284c7;
            --neon-2: #38bdf8;
            --shadow: rgba(27, 31, 36, 0.12);
        }
        {% elif theme == "dark" %}
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #2f81f7;
            --neon-1: #38bdf8;
            --neon-2: #60a5fa;
            --shadow: rgba(0, 0, 0, 0.4);
        }
        {% else %}
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #2f81f7;
            --neon-1: #38bdf8;
            --neon-2: #60a5fa;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #ffffff;
                --card: #f6f8fa;
                --border: #d0d7de;
                --text: #24292f;
                --muted: #57606a;
                --accent: #0969da;
                --neon-1: #0284c7;
                --neon-2: #38bdf8;
                --shadow: rgba(27, 31, 36, 0.12);
            }
        }
        {% endif %}

        .bg { fill: var(--bg); }
        .surface { fill: var(--card); filter: url(#shadow); }
        .border {
            fill: none;
            stroke: var(--border);
            stroke-width: 1;
        }
        .border-neon {
            fill: none;
            stroke: url(#neonGradient);
            stroke-width: 2;
            stroke-linecap: round;
            filter: url(#neonGlow);
        }
        .divider { stroke: var(--border); stroke-width: 1; opacity: 0.6; }

        .title {
            font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 600;
            font-size: 18px;
            fill: var(--text);
        }
        .subtitle {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.2px;
            fill: var(--muted);
        }
        .repo-name {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 600;
            font-size: 12px;
            fill: var(--text);
        }
        .repo-meta {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 11px;
            fill: var(--muted);
        }
        .repo-desc {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 10px;
            fill: var(--muted);
        }
        .repo-date {
            font-family: "JetBrains Mono", "SFMono-Regular", "Menlo", monospace;
            font-weight: 600;
            font-size: 11px;
            fill: var(--muted);
        }
        .repo-link {
            cursor: pointer;
            text-decoration: none;
        }
        .repo-link text {
            pointer-events: all;
        }
        .empty {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: var(--muted);
        }

        .enter {
            opacity: 1;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .bg-pattern,
            .border,
            .enter {
                animation: none;
            }
        }
    </style>

    <rect width="480" height="240" class="bg" />
    <g>
        <rect x="14" y="14" width="452" height="212" rx="14" class="surface" />
        <rect x="14" y="14" width="452" height="212" rx="14" class="border" />
        <rect x="14" y="14" width="452" height="212" rx="14" class="border-neon" stroke-dasharray="160 1168">
            <animate attributeName="stroke-dashoffset" from="0" to="-1328" dur="7s" repeatCount="indefinite" />
            <animate attributeName="stroke-dasharray" values="140 1188;220 1108;140 1188" dur="5s" repeatCount="indefinite" />
            <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="6s" repeatCount="indefinite" />
            <animate attributeName="stroke-width" values="1;1.6;1" dur="6s" repeatCount="indefinite" />
        </rect>
    </g>

    <g transform="translate(34, 40)" class="enter" style="animation-delay: 80ms;">
        <text x="0" y="0" class="title">Recent work</text>
        <text x="0" y="18" class="subtitle">Latest activity across repositories</text>
    </g>

    <line x1="34" y1="62" x2="446" y2="62" class="divider" />

    <g transform="translate(34, 80)">
        {% if recent_repos %}
            {% for repo in recent_repos %}
                <g transform="translate(0, {{ loop.index0 * 32 }})" class="enter" style="animation-delay: {{ 140 + loop.index0 * 80 }}ms;">
                    {% if repo.url %}
                        <a class="repo-link" href="{{ repo.url }}" xlink:href="{{ repo.url }}" target="_blank" rel="noopener noreferrer">
                            <text x="0" y="0" class="repo-name">{{ repo.display_name }}</text>
                        </a>
                    {% else %}
                        <text x="0" y="0" class="repo-name">{{ repo.display_name }}</text>
                    {% endif %}
                    <g transform="translate(280, 0)">
                        <circle cx="0" cy="-4" r="4" fill="{{ repo.language_color }}" />
                        <text x="8" y="0" class="repo-meta">{{ repo.language_name }}</text>
                    </g>
                    <text x="410" y="0" class="repo-date" text-anchor="end">{{ repo.updated_at }}</text>
                    {% if repo.description %}
                        <text x="0" y="14" class="repo-desc">{{ repo.description }}</text>
                    {% endif %}
                </g>
            {% endfor %}
        {% else %}
            <text x="0" y="0" class="empty">No recent activity found</text>
        {% endif %}
    </g>
</svg>
