<svg xmlns="http://www.w3.org/2000/svg" width="480" height="240" viewBox="0 0 480 240" fill="none">
    <defs>
        <pattern id="dotPattern" width="12" height="12" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="var(--pattern)" />
        </pattern>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="var(--shadow)" flood-opacity="0.35" />
        </filter>
    </defs>

    <style>
        
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #2f81f7;
            --pattern: rgba(255, 255, 255, 0.06);
            --shadow: rgba(0, 0, 0, 0.4);
        }
        

        .bg { fill: var(--bg); }
        .bg-pattern { fill: url(#dotPattern); }
        .surface { fill: var(--card); filter: url(#shadow); }
        .border { fill: none; stroke: var(--border); stroke-width: 1; }
        .divider { stroke: var(--border); stroke-width: 1; opacity: 0.6; }

        .title {
            font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 600;
            font-size: 18px;
            fill: var(--text);
        }
        .subtitle {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.2px;
            fill: var(--muted);
        }
        .lang-name {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: var(--text);
        }
        .percent {
            font-family: "JetBrains Mono", "SFMono-Regular", "Menlo", monospace;
            font-weight: 600;
            font-size: 12px;
            fill: var(--muted);
        }
        .bar-bg {
            fill: var(--border);
            opacity: 0.6;
        }
        .empty {
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: var(--muted);
        }

        .enter {
            opacity: 1;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>

    <rect width="480" height="240" class="bg" />
    <rect width="480" height="240" class="bg-pattern" />

    <g>
        <rect x="14" y="14" width="452" height="212" rx="14" class="surface" />
        <rect x="14" y="14" width="452" height="212" rx="14" class="border" />
    </g>

    <g transform="translate(34, 40)" class="enter" style="animation-delay: 80ms;">
        <text x="0" y="0" class="title">Top languages</text>
        <text x="0" y="18" class="subtitle">Most used across owned repositories</text>
    </g>

    <line x1="34" y1="62" x2="446" y2="62" class="divider" />

    <g transform="translate(34, 86)">
        
            
                <g transform="translate(0, 0)" class="enter" style="animation-delay: 140ms;">
                    <circle cx="4" cy="-4" r="4" fill="#f34b7d" />
                    <text x="14" y="0" class="lang-name">C++</text>
                    <rect x="170" y="-8" width="190" height="8" rx="4" class="bar-bg" />
                    <rect x="170" y="-8" width="134" height="8" rx="4" fill="#f34b7d" />
                    <text x="410" y="0" class="percent" text-anchor="end">70.5%</text>
                </g>
            
                <g transform="translate(0, 30)" class="enter" style="animation-delay: 220ms;">
                    <circle cx="4" cy="-4" r="4" fill="#e16737" />
                    <text x="14" y="0" class="lang-name">MATLAB</text>
                    <rect x="170" y="-8" width="190" height="8" rx="4" class="bar-bg" />
                    <rect x="170" y="-8" width="23" height="8" rx="4" fill="#e16737" />
                    <text x="410" y="0" class="percent" text-anchor="end">12.3%</text>
                </g>
            
                <g transform="translate(0, 60)" class="enter" style="animation-delay: 300ms;">
                    <circle cx="4" cy="-4" r="4" fill="#DAE1C2" />
                    <text x="14" y="0" class="lang-name">SystemVerilog</text>
                    <rect x="170" y="-8" width="190" height="8" rx="4" class="bar-bg" />
                    <rect x="170" y="-8" width="14" height="8" rx="4" fill="#DAE1C2" />
                    <text x="410" y="0" class="percent" text-anchor="end">7.4%</text>
                </g>
            
                <g transform="translate(0, 90)" class="enter" style="animation-delay: 380ms;">
                    <circle cx="4" cy="-4" r="4" fill="#3572A5" />
                    <text x="14" y="0" class="lang-name">Python</text>
                    <rect x="170" y="-8" width="190" height="8" rx="4" class="bar-bg" />
                    <rect x="170" y="-8" width="13" height="8" rx="4" fill="#3572A5" />
                    <text x="410" y="0" class="percent" text-anchor="end">7.0%</text>
                </g>
            
                <g transform="translate(0, 120)" class="enter" style="animation-delay: 460ms;">
                    <circle cx="4" cy="-4" r="4" fill="#DA3434" />
                    <text x="14" y="0" class="lang-name">CMake</text>
                    <rect x="170" y="-8" width="190" height="8" rx="4" class="bar-bg" />
                    <rect x="170" y="-8" width="6" height="8" rx="4" fill="#DA3434" />
                    <text x="410" y="0" class="percent" text-anchor="end">2.9%</text>
                </g>
            
        
    </g>
</svg>